[tool.ruff]
line-length = 120
target-version = "py312"
exclude = ["migrations", ".venv", "venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "S"]
ignore = [
    "E501",   # line-too-long (déjà 120)
    "B008",   # FastAPI Depends() in defaults
    "S101",   # asserts (utilisés dans tests)
    "S104",   # 0.0.0.0 binding
    "S105",   # hardcoded password (faux positifs sur strings)
    "S106",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
asyncio_mode = "auto"
filterwarnings = ["ignore::DeprecationWarning"]
