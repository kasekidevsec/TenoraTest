<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d14"/>
      <stop offset="100%" style="stop-color:#050508"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="#39ff1410" stroke-width="1"/>
  <line x1="0" y1="342" x2="512" y2="342" stroke="#39ff1410" stroke-width="1"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="#39ff1410" stroke-width="1"/>
  <line x1="342" y1="0" x2="342" y2="512" stroke="#39ff1410" stroke-width="1"/>

  <!-- Glow halo behind T -->
  <ellipse cx="256" cy="256" rx="120" ry="110" fill="#39ff14" opacity="0.07" filter="url(#glow2)"/>

  <!-- T letter - sharp, geometric, bold -->
  <g filter="url(#glow)">
    <!-- Horizontal bar -->
    <rect x="112" y="152" width="288" height="68" rx="4" fill="#39ff14"/>
    <!-- Vertical stem -->
    <rect x="214" y="220" width="84" height="168" rx="4" fill="#39ff14"/>
  </g>

  <!-- Corner accent marks -->
  <line x1="32" y1="32" x2="72" y2="32" stroke="#39ff14" stroke-width="3" opacity="0.5"/>
  <line x1="32" y1="32" x2="32" y2="72" stroke="#39ff14" stroke-width="3" opacity="0.5"/>
  <line x1="480" y1="32" x2="440" y2="32" stroke="#39ff14" stroke-width="3" opacity="0.5"/>
  <line x1="480" y1="32" x2="480" y2="72" stroke="#39ff14" stroke-width="3" opacity="0.5"/>
  <line x1="32" y1="480" x2="72" y2="480" stroke="#39ff14" stroke-width="3" opacity="0.5"/>
  <line x1="32" y1="480" x2="32" y2="440" stroke="#39ff14" stroke-width="3" opacity="0.5"/>
  <line x1="480" y1="480" x2="440" y2="480" stroke="#39ff14" stroke-width="3" opacity="0.5"/>
  <line x1="480" y1="480" x2="480" y2="440" stroke="#39ff14" stroke-width="3" opacity="0.5"/>
</svg>
